<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">AIGC 视频创作工作流</title>
  <desc id="desc">四个相互连接的阶段：脚本与分镜、AI 视觉生成、画面修整、剪辑输出。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2f82"/>
      <stop offset=".48" stop-color="#536fd7"/>
      <stop offset="1" stop-color="#8577c4"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".18"/>
      <stop offset="1" stop-color="#1a286b" stop-opacity=".32"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe8a5"/>
      <stop offset=".48" stop-color="#f4c55d"/>
      <stop offset="1" stop-color="#e09b32"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9eeeff"/>
      <stop offset="1" stop-color="#62a5ff"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#dfe7ff" stroke-opacity=".1"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#111a5a" flood-opacity=".38"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="1200" fill="url(#bg)"/>
  <rect width="900" height="1200" fill="url(#grid)"/>
  <circle cx="170" cy="205" r="230" fill="#78b8ff" opacity=".16"/>
  <circle cx="760" cy="650" r="250" fill="#c499e8" opacity=".15"/>
  <circle cx="340" cy="1115" r="250" fill="#6ef0de" opacity=".08"/>

  <g fill="none" stroke="#eef2ff" stroke-opacity=".22">
    <rect x="46" y="46" width="808" height="1108" rx="32"/>
    <rect x="64" y="64" width="772" height="1072" rx="24" stroke-dasharray="4 10"/>
  </g>

  <g font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" fill="#f8f9ff">
    <text x="105" y="132" font-size="22" font-weight="700" letter-spacing="3">AIGC 视频创作</text>
    <text x="105" y="177" font-size="48" font-weight="800">视觉工作流</text>
    <text x="105" y="214" font-size="16" letter-spacing="3" opacity=".72">构思  /  生成  /  修整  /  交付</text>
  </g>
  <path d="M105 244H795" stroke="#eef2ff" stroke-opacity=".28"/>

  <path d="M450 292V1038" stroke="#e6edff" stroke-opacity=".28" stroke-width="5"/>
  <path d="M450 292V1038" stroke="url(#gold)" stroke-width="2" stroke-dasharray="8 18" filter="url(#glow)"/>

  <!-- Stage 01 -->
  <g filter="url(#shadow)">
    <rect x="96" y="285" width="304" height="178" rx="22" fill="url(#panel)" stroke="#eef2ff" stroke-opacity=".35"/>
    <rect x="119" y="308" width="80" height="112" rx="8" fill="#eef2ff" opacity=".94"/>
    <path d="M136 332H183M136 350H183M136 368H174M136 386H179" stroke="#617bd7" stroke-width="7" stroke-linecap="round" opacity=".72"/>
    <rect x="219" y="308" width="152" height="49" rx="8" fill="#283c99" stroke="#b9c8ff" stroke-opacity=".55"/>
    <rect x="219" y="371" width="70" height="49" rx="8" fill="#283c99" stroke="#b9c8ff" stroke-opacity=".55"/>
    <rect x="301" y="371" width="70" height="49" rx="8" fill="#283c99" stroke="#b9c8ff" stroke-opacity=".55"/>
    <path d="M235 344l20-21 25 14 21-15 35 22M233 406l18-18 20 18M315 406l16-17 23 17" fill="none" stroke="#9eeeff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <circle cx="450" cy="374" r="30" fill="url(#gold)" filter="url(#glow)"/>
  <text x="450" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#27336e">01</text>
  <g font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" fill="#f8f9ff">
    <text x="500" y="360" font-size="17" letter-spacing="2" opacity=".74">阶段 01</text>
    <text x="500" y="395" font-size="31" font-weight="800">脚本与分镜</text>
    <text x="500" y="425" font-size="17" opacity=".82">脚本 / 镜头 / 故事线</text>
  </g>

  <!-- Stage 02 -->
  <g filter="url(#shadow)">
    <rect x="500" y="493" width="304" height="178" rx="22" fill="url(#panel)" stroke="#eef2ff" stroke-opacity=".35"/>
    <rect x="525" y="518" width="254" height="112" rx="10" fill="#1e2f82" stroke="#c4d3ff" stroke-opacity=".5"/>
    <rect x="546" y="539" width="88" height="70" rx="7" fill="#5278dd"/>
    <rect x="647" y="539" width="110" height="30" rx="6" fill="#435fb9"/>
    <rect x="647" y="579" width="50" height="30" rx="6" fill="#435fb9"/>
    <rect x="707" y="579" width="50" height="30" rx="6" fill="#435fb9"/>
    <path d="M561 591l18-23 13 12 16-20 14 31" fill="none" stroke="#a6efff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="url(#gold)" filter="url(#glow)">
      <path d="M542 504l4 11 11 4-11 4-4 11-4-11-11-4 11-4z"/>
      <path d="M775 487l3 8 8 3-8 3-3 8-3-8-8-3 8-3z"/>
    </g>
  </g>
  <circle cx="450" cy="582" r="30" fill="url(#gold)" filter="url(#glow)"/>
  <text x="450" y="591" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#27336e">02</text>
  <g font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" fill="#f8f9ff">
    <text x="96" y="567" font-size="17" letter-spacing="2" opacity=".74">阶段 02</text>
    <text x="96" y="602" font-size="31" font-weight="800">AI 视觉生成</text>
    <text x="96" y="632" font-size="17" opacity=".82">创意 / 图片 / 视频</text>
  </g>

  <!-- Stage 03 -->
  <g filter="url(#shadow)">
    <rect x="96" y="701" width="304" height="178" rx="22" fill="url(#panel)" stroke="#eef2ff" stroke-opacity=".35"/>
    <rect x="120" y="728" width="157" height="122" rx="10" fill="#233782" stroke="#c5d3ff" stroke-opacity=".5"/>
    <rect x="137" y="745" width="123" height="39" rx="6" fill="#536fcb"/>
    <rect x="137" y="795" width="123" height="38" rx="6" fill="#7485d7"/>
    <path d="M150 772l20-15 19 7 19-12 31 20M150 820l20-10 18 5 17-8 34 13" fill="none" stroke="#bcefff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="329" cy="757" r="35" fill="none" stroke="#ffca62" stroke-width="12" stroke-dasharray="38 14 28 12 42 16"/>
    <circle cx="329" cy="823" r="22" fill="none" stroke="#95edff" stroke-width="9" stroke-dasharray="27 10 21 11"/>
  </g>
  <circle cx="450" cy="790" r="30" fill="url(#gold)" filter="url(#glow)"/>
  <text x="450" y="799" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#27336e">03</text>
  <g font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" fill="#f8f9ff">
    <text x="500" y="775" font-size="17" letter-spacing="2" opacity=".74">阶段 03</text>
    <text x="500" y="810" font-size="31" font-weight="800">画面修整</text>
    <text x="500" y="840" font-size="17" opacity=".82">色彩 / 清理 / 一致性</text>
  </g>

  <!-- Stage 04 -->
  <g filter="url(#shadow)">
    <rect x="500" y="909" width="304" height="178" rx="22" fill="url(#panel)" stroke="#eef2ff" stroke-opacity=".35"/>
    <rect x="524" y="936" width="255" height="112" rx="10" fill="#1e2f82" stroke="#c5d3ff" stroke-opacity=".5"/>
    <rect x="542" y="956" width="218" height="18" rx="4" fill="#5276d2"/>
    <rect x="542" y="986" width="62" height="13" rx="3" fill="#f3c65c"/>
    <rect x="611" y="986" width="78" height="13" rx="3" fill="#8cdff5"/>
    <rect x="696" y="986" width="64" height="13" rx="3" fill="#c19be7"/>
    <path d="M542 1025h218M564 1011v29M608 1011v29M662 1011v29M716 1011v29" stroke="#dfe7ff" stroke-opacity=".7" stroke-width="3" stroke-linecap="round"/>
    <path d="M724 945l19 11-19 11z" fill="#f9e8a3"/>
  </g>
  <circle cx="450" cy="998" r="30" fill="url(#gold)" filter="url(#glow)"/>
  <text x="450" y="1007" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#27336e">04</text>
  <g font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" fill="#f8f9ff">
    <text x="96" y="983" font-size="17" letter-spacing="2" opacity=".74">阶段 04</text>
    <text x="96" y="1018" font-size="31" font-weight="800">剪辑与输出</text>
    <text x="96" y="1048" font-size="17" opacity=".82">时间轴 / 声音 / 交付</text>
  </g>

  <path d="M105 1108H795" stroke="#eef2ff" stroke-opacity=".28"/>
  <circle cx="746" cy="1117" r="9" fill="#f4c55d" filter="url(#glow)"/>
  <g font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" font-weight="700" letter-spacing="3" fill="#f8f9ff" opacity=".7">
    <text x="105" y="1125">创作系统</text>
    <text x="524" y="1125">从构思到交付</text>
  </g>
</svg>
