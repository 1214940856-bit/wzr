<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=./index.html">
  <title>启动 Kevin 作品集</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #09090b;
      color: #f6f3ee;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
    }

    main {
      width: min(420px, calc(100vw - 40px));
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      font-weight: 700;
    }

    p {
      margin: 0 0 22px;
      color: #aaa49b;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 0 18px;
      background: #f6f3ee;
      color: #09090b;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
  <script>
    window.location.replace("./index.html");
  </script>
</head>
<body>
  <main>
    <h1>正在启动作品集</h1>
    <p>如果页面没有自动打开，请点击下面的按钮进入。</p>
    <a href="./index.html">打开 index.html</a>
  </main>
</body>
</html>
